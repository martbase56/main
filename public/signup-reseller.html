<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MartBaseBD - রিসেলার রেজিস্ট্রেশন</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        canvas: '#FAF6F4',
                        dark: '#111827',
                        muted: '#4B5563',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-canvas font-bangla text-dark min-h-screen flex items-center justify-center p-5">

    <div class="w-full max-w-[550px] bg-white rounded-2xl border border-black/[0.02] p-8 md:p-10 shadow-xl shadow-primary/5">
        <div class="text-center mb-6">
            <a href="/" class="font-headings font-extrabold text-3xl text-primary tracking-tight">MartBaseBD</a>
            <p class="text-sm text-muted mt-1">Premium Work & Earn Platform</p>
        </div>

        <h3 class="text-xl font-bold text-center mb-6 text-dark flex items-center justify-center gap-2"><i class="fa-solid fa-briefcase text-primary"></i> রিসেলার অ্যাকাউন্ট খুলুন</h3>

        <form id="reseller-signup-form" class="space-y-4">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block font-semibold text-sm mb-1 text-dark">সম্পূর্ণ নাম</label>
                    <input type="text" id="fullname" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="যেমন: আলী হোসেন" required>
                </div>
                <div>
                    <label class="block font-semibold text-sm mb-1 text-dark">ইমেইল ঠিকানা</label>
                    <input type="email" id="email" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block font-semibold text-sm mb-1 text-dark">মোবাইল নম্বর</label>
                    <input type="tel" id="phone" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="01XXXXXXXXX" required>
                </div>
                <div>
                    <label class="block font-semibold text-sm mb-1 text-dark">পাসওয়ার্ড</label>
                    <input type="password" id="password" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="পাসওয়ার্ড দিন" required>
                </div>
            </div>

            <div>
                <label class="block font-semibold text-sm mb-1 text-dark">ফেসবুক পেজ / প্রোফাইল লিংক (ঐচ্ছিক)</label>
                <input type="url" id="fb_link" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="https://facebook.com/yourprofile">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block font-semibold text-sm mb-1 text-dark">শিক্ষাগত যোগ্যতা</label>
                    <input type="text" id="education" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="যেমন: অনার্স / ডিগ্রি" required>
                </div>
                <div>
                    <label class="block font-semibold text-sm mb-1 text-dark">বয়স</label>
                    <input type="number" id="age" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="যেমন: ২৫" min="15" required>
                </div>
            </div>

            <div>
                <label class="block font-semibold text-sm mb-1 text-dark">বর্তমান ঠিকানা</label>
                <textarea id="address" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all h-20 resize-none" placeholder="আপনার সম্পূর্ণ ঠিকানা লিখুন" required></textarea>
            </div>

            <button type="submit" class="w-full py-3.5 bg-primary text-white rounded-xl font-semibold hover:bg-secondary transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2"><i class="fa-solid fa-briefcase"></i> রিসেলার হিসেবে রেজিস্ট্রেশন করুন</button>
        </form>

        <div class="text-center mt-6 text-sm text-muted space-y-2">
            <p>ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="/login" class="text-primary font-semibold hover:underline">লগইন করুন</a></p>
            <p>সাধারণ ক্রেতা অ্যাকাউন্ট খুলতে চান? <a href="/signup" class="text-primary font-semibold hover:underline">এখানে ক্লিক করুন</a></p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const supabaseUrl = 'YOUR_SUPABASE_URL';
            const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
            let supabase = null;

            try {
                if (supabaseUrl && supabaseUrl !== 'YOUR_SUPABASE_URL') {
                    supabase = supabaseJS.createClient(supabaseUrl, supabaseKey);
                }
            } catch (err) {
                console.error("Supabase load fail", err);
            }

            document.getElementById('reseller-signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!supabase) {
                    alert("সুপাবেস কানেকশন সেটআপ করা হয়নি।");
                    return;
                }

                const fullname = document.getElementById('fullname').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const password = document.getElementById('password').value;
                const fb_link = document.getElementById('fb_link').value;
                const education = document.getElementById('education').value;
                const age = document.getElementById('age').value;
                const address = document.getElementById('address').value;

                try {
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullname,
                                phone_number: phone,
                                role: 'reseller',
                                fb_link: fb_link,
                                education: education,
                                age: parseInt(age),
                                address: address
                            }
                        }
                    });

                    if (error) {
                        alert("রেজিস্ট্রেশন ত্রুটি: " + error.message);
                        return;
                    }

                    if (data.user) {
                        alert("রিসেলার হিসেবে আবেদন সম্পন্ন হয়েছে! অনুগ্রহ করে আপনার ইমেইল চেক করুন।");
                        window.location.href = "/login";
                    }
                } catch (err) {
                    alert("রিসেলার সাইনআপ ফেইলড।");
                }
            });
        });
    </script>
</body>
</html>
