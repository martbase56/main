<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MerketBaseBD - Reseller Inventory Products</title>
    
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        canvas: '#FAF6F4',
                        dark: '#111827',
                        muted: '#4B5563',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-canvas font-bangla text-dark min-h-screen pb-24">

    <!-- 📱 App Style Sticky Header -->
    <header class="bg-white/95 backdrop-blur-md border-b border-primary/10 sticky top-0 z-40 px-4 py-3.5 flex justify-between items-center shadow-sm">
        <span class="font-headings font-extrabold text-xl text-primary">MerketBaseBD Inventory</span>
        <a href="/dashboard/reseller" class="text-xs font-bold text-primary flex items-center gap-1"><i class="fa-solid fa-arrow-left"></i> ড্যাশবোর্ড</a>
    </header>

    <main class="max-w-[1200px] mx-auto px-4 pt-5 space-y-6">

        <!-- 🔍 ১. রিয়েল-টাইম সার্চ সেকশন (গ্লোয়িং বর্ডার) -->
        <section class="max-w-[700px] mx-auto">
            <div class="relative flex items-center bg-white rounded-full border border-primary/20 shadow-xl focus-within:border-primary focus-within:ring-4 focus-within:ring-primary/10 transition-all overflow-hidden p-1.5">
                <div class="flex items-center pl-4 pr-2 text-primary">
                    <i class="fa-solid fa-magnifying-glass text-xl animate-pulse"></i>
                </div>
                <input type="text" id="search-input" class="w-full py-3.5 outline-none font-bangla text-dark bg-transparent text-sm placeholder-gray-400 font-medium" placeholder="কোড বা প্রোডাক্টের নাম দিয়ে অনুসন্ধান করুন...">
                <button class="bg-primary hover:bg-secondary text-white font-bold py-3.5 px-6 rounded-full text-xs transition-all shadow-md shrink-0"><i class="fa-solid fa-filter"></i> খুঁজুন</button>
            </div>
        </section>

        <!-- 🏷️ ২. ডাইনামিক ক্যাটাগরি স্ক্রোল লিস্ট -->
        <section class="space-y-3">
            <div class="flex gap-3 overflow-x-auto no-scrollbar py-1" id="categories-scroll">
                <button onclick="selectCategory('all')" id="cat-btn-all" class="cat-pill bg-primary text-white border border-primary/20 rounded-full px-5 py-2 text-xs font-bold shrink-0 hover:border-primary transition-all">
                    <i class="fa-solid fa-list-ul mr-1.5"></i> সকল ক্যাটাগরি
                </button>
                <!-- ক্যাটাগরি বাটনগুলো এখানে ডাইনামিকালি লোড হবে -->
            </div>
        </section>

        <!-- 📦 ৩. Products Grid Layout (১ম বার ৪০টি করে রেন্ডার হবে) -->
        <section class="space-y-4">
            <h3 class="text-base font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-bolt-lightning text-primary animate-pulse"></i> রিসেলিং প্রোডাক্টস ও হোল্ড বোনাস ট্র্যাক</h3>
            <div class="products-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4" id="products-container">
                <!-- প্রোডাক্ট কার্ডগুলো এখানে স্ক্রল ভিত্তিক ডাইনামিক লোড হবে -->
            </div>

            <!-- 🔄 ৪. লোডিং স্পিনার ও নো-মোর প্রোডাক্টস এলার্ট -->
            <div id="loading-spinner" class="py-10 text-center flex flex-col items-center justify-center gap-2">
                <i class="fa-solid fa-spinner animate-spin text-primary text-3xl"></i>
                <span class="text-xs font-bold text-muted">পরবর্তী প্রোডাক্ট লোড হচ্ছে...</span>
            </div>

            <div id="no-more-products" class="py-10 text-center hidden flex-col items-center justify-center gap-2">
                <i class="fa-solid fa-circle-check text-green-500 text-3xl"></i>
                <span class="text-sm font-bold text-muted">আপাতত আর কোনো নতুন প্রোডাক্ট নেই!</span>
            </div>
        </section>

    </main>

    <!-- 📱 Sticky Bottom Navigation Bar (Bottom Nav - Sync to Reseller Profile) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-2.5 px-4 flex justify-between items-center shadow-lg z-40 rounded-t-2xl">
        <a href="/dashboard/reseller" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors shrink-0">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[0.65rem] font-bold">ড্যাশবোর্ড</span>
        </a>
        <a href="/profile" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors shrink-0">
            <i class="fa-solid fa-clock-rotate-left text-lg"></i>
            <span class="text-[0.65rem] font-bold">অর্ডারসমূহ</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-primary shrink-0">
            <i class="fa-solid fa-box-open text-lg"></i>
            <span class="text-[0.65rem] font-bold">প্রোডাক্টস</span>
        </a>
        <a href="/dashboard/reseller-profile" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors shrink-0">
            <i class="fa-solid fa-wallet text-lg"></i>
            <span class="text-[0.65rem] font-bold">উইথড্র</span>
        </a>
        <a href="/dashboard/reseller-profile" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors shrink-0">
            <i class="fa-solid fa-circle-user text-lg"></i>
            <span class="text-[0.65rem] font-bold">অ্যাকাউন্ট</span>
        </a>
    </nav>

    <!-- Supabase SDK & Global Layout -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/layout.js"></script>
    
    <script>
        let supabaseClientInstance = null;
        let resellerUserId = null;
        let currentPage = 1;
        const pageSize = 40; 
        let isLoading = false;
        let hasMore = true;
        let selectedCategoryId = 'all';
        let searchQuery = '';

        document.addEventListener('DOMContentLoaded', () => {
            
            // --- ক. সুপাবেস ইনিশিয়ালাইজেশন ও গেটকিপার চেক ---
            async function checkLayoutAndLoad() {
                if (!window.supabaseClient) {
                    setTimeout(checkLayoutAndLoad, 100);
                    return;
                }
                supabaseClientInstance = window.supabaseClient;
                verifyResellerSession();
            }

            async function verifyResellerSession() {
                try {
                    const { data: { session } } = await supabaseClientInstance.auth.getSession();
                    if (!session) {
                        window.location.href = "/login";
                        return;
                    }
                    resellerUserId = session.user.id;

                    const { data: profile } = await supabaseClientInstance.from('profiles').select('role, is_active').eq('id', resellerUserId).single();
                    if (!profile || profile.role !== 'reseller') {
                        alert("অনুমতি নেই!");
                        window.location.href = "/";
                        return;
                    }

                    if (!profile.is_active) {
                        window.location.href = "/active";
                        return;
                    }

                    // সেশন সাকসেসফুল হলে ডাটা লোড হবে
                    loadCategoriesPills();
                    loadProducts(true);

                } catch(e) {
                    console.error("Auth verify failed", e);
                }
            }

            // --- খ. ক্যাটাগরি তালিকা পিলস লোড ---
            async function loadCategoriesPills() {
                try {
                    const { data: categories } = await supabaseClientInstance.from('categories').select('*').limit(20);
                    const scrollContainer = document.getElementById('categories-scroll');
                    
                    if (categories && categories.length > 0) {
                        categories.forEach(cat => {
                            scrollContainer.innerHTML += `
                                <button onclick="selectCategory('${cat.id}')" id="cat-btn-${cat.id}" class="cat-pill bg-white border border-gray-200 rounded-full px-5 py-2 text-xs font-bold text-dark flex items-center gap-2 shrink-0 hover:border-primary transition-all">
                                    <i class="fa-solid ${cat.icon} text-primary"></i> ${cat.name}
                                </button>
                            `;
                        });
                    }
                } catch(e) {}
            }

            window.selectCategory = function(catId) {
                selectedCategoryId = catId;
                currentPage = 1;
                hasMore = true;
                
                document.querySelectorAll('.cat-pill').forEach(btn => {
                    btn.className = "cat-pill bg-white border border-gray-200 rounded-full px-5 py-2 text-xs font-bold text-dark flex items-center gap-2 shrink-0 hover:border-primary transition-all";
                });
                const activeBtn = document.getElementById('cat-btn-' + catId);
                if (activeBtn) {
                    activeBtn.className = "cat-pill bg-primary text-white border border-primary/20 rounded-full px-5 py-2 text-xs font-bold shrink-0 hover:border-primary transition-all";
                }

                loadProducts(true); 
            };

            // --- গ. ডাইনামিক প্রোডাক্ট পেজিনেশন ও ইনফিনিট স্ক্রল লোডার ---
            async function loadProducts(isFirstPage = false) {
                if (isLoading) return;
                isLoading = true;

                const prodContainer = document.getElementById('products-container');
                const spinner = document.getElementById('loading-spinner');
                const noMoreAlert = document.getElementById('no-more-products');

                spinner.classList.remove('hidden');
                noMoreAlert.classList.add('hidden');

                if (isFirstPage) {
                    prodContainer.innerHTML = '';
                    currentPage = 1;
                }

                const startIndex = (currentPage - 1) * pageSize;
                const endIndex = startIndex + pageSize - 1;

                try {
                    let query = supabaseClientInstance.from('products').select('*');

                    if (selectedCategoryId !== 'all') {
                        query = query.eq('category_id', selectedCategoryId);
                    }

                    if (searchQuery !== '') {
                        query = query.or(`title.ilike.%${searchQuery}%,product_code.ilike.%${searchQuery}%`);
                    }

                    const { data: products, error } = await query
                        .range(startIndex, endIndex)
                        .order('created_at', { ascending: false });

                    if (error) throw error;

                    if (products && products.length > 0) {
                        products.forEach(prod => {
                            const cardImgUrl = (prod.images && prod.images.length > 0) ? prod.images[0] : prod.image_url;
                            
                            // কাস্টমার বিক্রয় মূল্য নির্ধারণ
                            const retailPrice = prod.customer_offer_price ? parseFloat(prod.customer_offer_price) : parseFloat(prod.regular_price);
                            const resellerPrice = parseFloat(prod.reseller_price);
                            const minProfit = Math.max(retailPrice - resellerPrice, 0);

                            prodContainer.innerHTML += `
                                <div class="product-card group bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col hover:translate-y-[-5px] hover:border-primary/20 hover:shadow-lg transition-all duration-300 relative shadow-sm">
                                    <!-- আপনার ন্যূনতম লাভ গোল্ডেন অরেঞ্জ ব্যাজ আকারে শো করবে -->
                                    <span class="absolute top-3 left-3 bg-emerald-600 text-white text-[0.65rem] font-black px-2.5 py-1 rounded-lg z-10 shadow-sm flex items-center gap-1">
                                        <i class="fa-solid fa-fire text-yellow-300 animate-pulse"></i> লাভ: ৳${minProfit}
                                    </span>
                                    
                                    <button onclick="toggleFavorite('${prod.id}')" class="absolute top-3 right-3 w-8 h-8 bg-white/95 backdrop-blur rounded-full flex items-center justify-center text-red-500 shadow-sm hover:scale-110 active:scale-95 transition-transform z-10"><i class="fa-solid fa-heart"></i></button>
                                    
                                    <!-- (ডাইনামিক ফিক্স) ক্লিকেবল লিংক সরাসরি নতুন রিসেলার প্রোডাক্ট ডিটেইলসে (/dashboard/reseller-product) রিডাইরেক্ট করবে -->
                                    <a href="/dashboard/reseller-product?id=${prod.id}" class="w-full h-40 bg-gray-50 flex items-center justify-center overflow-hidden relative">
                                        ${cardImgUrl ? `<img src="${cardImgUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" alt="${prod.title}">` : `<i class="fa-solid fa-image text-3xl text-gray-400"></i>`}
                                    </a>
                                    
                                    <div class="product-info p-3 flex flex-col flex-grow">
                                        <!-- টাইটেল লিংকও নতুন রিসেলার প্রোডাক্ট ডিটেইলসে রিডাইরেক্ট করবে -->
                                        <h4 class="product-title font-bold text-xs text-dark line-clamp-2 h-8 mb-2 group-hover:text-primary transition-colors leading-snug">
                                            <a href="/dashboard/reseller-product?id=${prod.id}">${prod.title}</a>
                                        </h4>
                                        
                                        <!-- রিসেলার প্রাইসিং প্যানেল -->
                                        <div class="space-y-1.5 border-t border-gray-50 pt-2 mb-3 mt-auto">
                                            <div class="flex justify-between items-center text-[0.7rem] font-bold">
                                                <span class="text-primary">রিসেলার দাম:</span>
                                                <span class="text-primary font-body font-extrabold">৳${resellerPrice}</span>
                                            </div>
                                            <div class="flex justify-between items-center text-[0.65rem] text-muted">
                                                <span>খুচরা মূল্য:</span>
                                                <span class="font-body font-semibold">৳${retailPrice}</span>
                                            </div>
                                        </div>
                                        
                                        <!-- কুইক কার্ট এবং ডিরেক্ট বাই নাও বাটন (অর্ডার প্লেসিং) -->
                                        <div class="grid grid-cols-2 gap-1.5 mt-auto">
                                            <button onclick="addToCart('${prod.id}', '${prod.title}', '${resellerPrice}', '${cardImgUrl || ""}')" class="py-2 bg-gray-100 text-dark rounded-lg font-bold text-[0.7rem] hover:bg-gray-200 transition-all flex items-center justify-center gap-1"><i class="fa-solid fa-cart-plus text-primary"></i> Cart</button>
                                            <button onclick="buyNow('${prod.id}', '${prod.title}', '${resellerPrice}', '${cardImgUrl || ""}')" class="py-2 bg-primary text-white rounded-lg font-bold text-[0.7rem] hover:bg-secondary hover:shadow-md transition-all flex items-center justify-center gap-1"><i class="fa-solid fa-bag-shopping"></i> Order</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });

                        if (products.length < pageSize) {
                            hasMore = false;
                            noMoreAlert.classList.remove('hidden');
                            spinner.classList.add('hidden');
                        } else {
                            currentPage++; 
                        }
                    } else {
                        hasMore = false;
                        if (isFirstPage) {
                            prodContainer.innerHTML = '<p class="col-span-full text-center py-10 font-bold text-muted">দুঃখিত, কোনো প্রোডাক্ট পাওয়া যায়নি!</p>';
                        } else {
                            noMoreAlert.classList.remove('hidden');
                        }
                        spinner.classList.add('hidden');
                    }

                } catch (err) {
                    console.error("Failed to load products list:", err);
                    spinner.classList.add('hidden');
                } finally {
                    isLoading = false;
                }
            }

            // --- ঘ. মাউস স্ক্রল ডিটেকশন (Infinite Scroll Trigger) ---
            window.addEventListener('scroll', () => {
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                    if (!isLoading && hasMore) {
                        loadProducts(false); 
                    }
                }
            });

            // --- ঙ. সার্চ বক্স - ক্যাটাগরি ফিল্টার চেইন ---
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase().trim();
                    hasMore = true;
                    loadProducts(true); 
                });
            }

            // --- চ. লেআউট শেয়ার্ড কার্ট ও ফেভারিট অ্যাকশনস ---
            window.updateLocalBadges = function() {
                if (typeof window.updateLayoutBadges === "function") window.updateLayoutBadges();
            };

            window.addToCart = function(productId, title, price, imageUrl) {
                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                const existingItem = cart.find(item => item.product_id === productId);
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    cart.push({ product_id: productId, title: title, price: parseFloat(price), image_url: imageUrl, quantity: 1 });
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                updateLocalBadges();
                alert("সাফল্য! প্রোডাক্টটি কার্টে যোগ করা হয়েছে।");
            };

            window.buyNow = function(productId, title, price, imageUrl) {
                const tempCart = [{ product_id: productId, title: title, price: parseFloat(price), image_url: imageUrl, quantity: 1 }];
                localStorage.setItem('cart', JSON.stringify(tempCart));
                window.location.href = `/checkout?id=${productId}&qty=1`;
            };

            window.toggleFavorite = function(productId) {
                let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
                const index = wishlist.indexOf(productId);
                if (index > -1) {
                    wishlist.splice(index, 1);
                    alert("পছন্দের তালিকা থেকে বাদ দেওয়া হয়েছে।");
                } else {
                    wishlist.push(productId);
                    alert("পছন্দের তালিকায় যোগ করা হয়েছে।");
                }
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
                updateLocalBadges();
            };

            checkLayoutAndLoad();
        });
    </script>
</body>
</html>
