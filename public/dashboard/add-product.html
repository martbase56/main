<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MartBaseBD - Add New Product</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        canvas: '#FAF6F4',
                        dark: '#111827',
                        muted: '#4B5563',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-canvas font-bangla text-dark min-h-screen">

    <div class="max-w-[800px] mx-auto p-6 md:p-10 my-10 bg-white rounded-3xl border border-black/[0.02] shadow-xl shadow-primary/5">
        
        <div class="flex justify-between items-center mb-8 border-b border-gray-100 pb-5">
            <div>
                <h2 class="text-2xl font-extrabold text-dark flex items-center gap-2">
                    <i class="fa-solid fa-square-plus text-primary"></i> নতুন পণ্য যোগ করুন
                </h2>
                <p class="text-sm text-muted">প্রোডাক্টের বিবরণ ও ইমেজ আপলোড করুন</p>
            </div>
            <a href="/dashboard/admin" class="text-sm font-semibold text-primary hover:underline"><i class="fa-solid fa-arrow-left"></i> ড্যাশবোর্ডে ফিরে যান</a>
        </div>

        <form id="add-product-form" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block font-semibold text-sm mb-1">প্রোডাক্টের নাম</label>
                    <input type="text" id="product_name" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all text-dark" placeholder="যেমন: প্রিমিয়াম ম্যাপেল কফি মগ" required>
                </div>
                <div>
                    <label class="block font-semibold text-sm mb-1">প্রোডাক্ট কোড (SKU)</label>
                    <input type="text" id="product_code" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl font-body outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all text-dark" placeholder="যেমন: MB-MUG-102" required>
                </div>
            </div>

            <div>
                <label class="block font-semibold text-sm mb-1">বিস্তারিত বিবরণ (Description)</label>
                <textarea id="description" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all h-28 resize-none text-dark" placeholder="পণ্যটির গুণাবলী এবং বিবরণ লিখুন..." required></textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-primary/5 p-4 rounded-2xl border border-primary/10">
                <div>
                    <label class="block font-semibold text-xs mb-1 text-primary">সাধারণ খুচরা মূল্য (Price)</label>
                    <input type="number" id="regular_price" class="w-full px-3 py-2 border border-gray-200 rounded-lg font-body outline-none focus:border-primary bg-white text-dark" placeholder="৳" required>
                </div>
                <div>
                    <label class="block font-semibold text-xs mb-1 text-primary">কাস্টমার অফার প্রাইস (ঐচ্ছিক)</label>
                    <input type="number" id="offer_price" class="w-full px-3 py-2 border border-gray-200 rounded-lg font-body outline-none focus:border-primary bg-white text-dark" placeholder="৳">
                </div>
                <div>
                    <label class="block font-semibold text-xs mb-1 text-primary">রিসেলার ক্রয় মূল্য</label>
                    <input type="number" id="reseller_price" class="w-full px-3 py-2 border border-gray-200 rounded-lg font-body outline-none focus:border-primary bg-white text-dark" placeholder="৳" required>
                </div>
                <div>
                    <label class="block font-semibold text-xs mb-1 text-primary">হোল্ড ব্যালেন্স বোনাস</label>
                    <input type="number" id="hold_bonus" class="w-full px-3 py-2 border border-gray-200 rounded-lg font-body outline-none focus:border-primary bg-white text-dark" placeholder="৳" value="0">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div>
                    <label class="block font-semibold text-sm mb-1">প্রধান ক্যাটাগরি</label>
                    <select id="category_id" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary text-dark" required>
                        <option value="">নির্বাচন করুন</option>
                    </select>
                </div>
                <div>
                    <label class="block font-semibold text-sm mb-1">সাব-ক্যাটাগরি (ঐচ্ছিক)</label>
                    <input type="text" id="subcategory" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary transition-all text-dark" placeholder="যেমন: কিচেনওয়্যার">
                </div>
                <div>
                    <label class="block font-semibold text-sm mb-1">স্টক পরিমাণ (Stock)</label>
                    <input type="number" id="stock" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl font-body outline-none focus:border-primary transition-all text-dark" placeholder="যেমন: ৫০" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div>
                    <label class="block font-semibold text-sm mb-1">উপলব্ধ সাইজ (Sizes - কমা দিয়ে লিখুন)</label>
                    <input type="text" id="sizes" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary text-dark" placeholder="S, M, L, XL">
                </div>
                <div>
                    <label class="block font-semibold text-sm mb-1">উপলব্ধ রঙ (Colors - কমা দিয়ে লিখুন)</label>
                    <input type="text" id="colors" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary text-dark" placeholder="Red, Blue, Black">
                </div>
                <div>
                    <label class="block font-semibold text-sm mb-1">ওয়ারেন্টি পলিসি</label>
                    <div class="flex gap-4 items-center h-[46px]">
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="radio" name="warranty" value="no" checked class="warranty-radio accent-primary"> No
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="radio" name="warranty" value="yes" class="warranty-radio accent-primary"> Yes
                        </label>
                        <input type="number" id="warranty_days" class="hidden w-24 px-3 py-1.5 border border-gray-200 rounded-lg font-body outline-none focus:border-primary text-dark" placeholder="দিন সংখ্যা">
                    </div>
                </div>
            </div>

            <div>
                <label class="block font-semibold text-sm mb-2"><i class="fa-solid fa-images text-primary"></i> প্রোডাক্ট ইমেজ (সর্বোচ্চ ৪টি ছবি আপলোড করুন)</label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="images-uploader-container">
                    
                    <div class="image-slot relative border-2 border-dashed border-gray-200 rounded-2xl h-28 flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-colors overflow-hidden">
                        <input type="file" class="image-input absolute inset-0 opacity-0 cursor-pointer" accept="image/*" data-slot="0">
                        <div class="slot-placeholder flex flex-col items-center justify-center text-gray-400">
                            <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                            <span class="text-[0.65rem] font-bold mt-1">Image 1</span>
                        </div>
                    </div>
                    
                    <div class="image-slot relative border-2 border-dashed border-gray-200 rounded-2xl h-28 flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-colors overflow-hidden">
                        <input type="file" class="image-input absolute inset-0 opacity-0 cursor-pointer" accept="image/*" data-slot="1">
                        <div class="slot-placeholder flex flex-col items-center justify-center text-gray-400">
                            <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                            <span class="text-[0.65rem] font-bold mt-1">Image 2</span>
                        </div>
                    </div>
                    
                    <div class="image-slot relative border-2 border-dashed border-gray-200 rounded-2xl h-28 flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-colors overflow-hidden">
                        <input type="file" class="image-input absolute inset-0 opacity-0 cursor-pointer" accept="image/*" data-slot="2">
                        <div class="slot-placeholder flex flex-col items-center justify-center text-gray-400">
                            <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                            <span class="text-[0.65rem] font-bold mt-1">Image 3</span>
                        </div>
                    </div>
                    
                    <div class="image-slot relative border-2 border-dashed border-gray-200 rounded-2xl h-28 flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-colors overflow-hidden">
                        <input type="file" class="image-input absolute inset-0 opacity-0 cursor-pointer" accept="image/*" data-slot="3">
                        <div class="slot-placeholder flex flex-col items-center justify-center text-gray-400">
                            <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                            <span class="text-[0.65rem] font-bold mt-1">Image 4</span>
                        </div>
                    </div>

                </div>
            </div>

            <button type="submit" id="btn-submit" class="w-full py-4 bg-primary text-white rounded-xl font-bold hover:bg-secondary transition-all shadow-lg shadow-primary/10 flex items-center justify-center gap-2 text-lg">
                <i class="fa-solid fa-circle-check"></i> পণ্যটি ডাটাবেজে যুক্ত করুন
            </button>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const uploadedImages = ["", "", "", ""];
        let supabaseClient = null;

        document.addEventListener('DOMContentLoaded', async () => {
            
            async function initializeSupabase() {
                try {
                    const response = await fetch('/api/auth/config');
                    if (!response.ok) throw new Error("Config API Error");
                    const config = await response.json();
                    
                    if (config.supabase_url && config.supabase_anon_key) {
                        supabaseClient = window.supabase.createClient(config.supabase_url, config.supabase_anon_key);
                        console.log("Supabase Client initialized dynamically.");
                        await loadCategories();
                    } else {
                        console.warn("সুপাবেস ডেমো মোডে চলছে।");
                        loadMockCategories();
                    }
                } catch (err) {
                    console.error("Supabase load error", err);
                    loadMockCategories();
                }
            }

            async function loadCategories() {
                try {
                    const { data: categories } = await supabaseClient.from('categories').select('*');
                    const catDropdown = document.getElementById('category_id');
                    if (categories && categories.length > 0) {
                        catDropdown.innerHTML = `<option value="">নির্বাচন করুন</option>`;
                        categories.forEach(cat => {
                            catDropdown.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                        });
                    }
                } catch(e) {
                    console.error("Categories fetch error", e);
                }
            }

            function loadMockCategories() {
                const catDropdown = document.getElementById('category_id');
                catDropdown.innerHTML = `
                    <option value="">নির্বাচন করুন</option>
                    <option value="demo_id">ম্যান্স ফ্যাশন (ডেমো)</option>
                `;
            }

            const warrantyRadios = document.querySelectorAll('.warranty-radio');
            const warrantyDaysInput = document.getElementById('warranty_days');

            warrantyRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === 'yes') {
                        warrantyDaysInput.classList.remove('hidden');
                        warrantyDaysInput.required = true;
                    } else {
                        warrantyDaysInput.classList.add('hidden');
                        warrantyDaysInput.required = false;
                        warrantyDaysInput.value = '';
                    }
                });
            });

            const imageInputs = document.querySelectorAll('.image-input');
            imageInputs.forEach(input => {
                input.addEventListener('change', async (e) => {
                    const slotIndex = parseInt(input.getAttribute('data-slot'));
                    await uploadImageSlot(input, slotIndex);
                });
            });

            async function uploadImageSlot(input, slotIndex) {
                const file = input.files[0];
                if (!file) return;

                const slot = input.parentElement;
                const placeholder = slot.querySelector('.slot-placeholder');

                placeholder.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-primary text-xl"></i><span class="text-[0.65rem] font-bold mt-1">Uploading...</span>`;

                const formData = new FormData();
                formData.append("file", file);

                try {
                    const response = await fetch('/api/products/upload-image', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();
                    if (response.ok && result.url) {
                        uploadedImages[slotIndex] = result.url;
                        slot.style.backgroundImage = `url('${result.url}')`;
                        slot.style.backgroundSize = 'cover';
                        slot.style.backgroundPosition = 'center';
                        placeholder.style.display = 'none';
                    } else {
                        alert("আপলোড ব্যর্থ হয়েছে: " + result.detail);
                        resetSlot(slot, placeholder, slotIndex);
                    }
                } catch (err) {
                    alert("সার্ভার কানেকশনে সমস্যা হয়েছে।");
                    resetSlot(slot, placeholder, slotIndex);
                }
            }

            function resetSlot(slot, placeholder, index) {
                slot.style.backgroundImage = 'none';
                placeholder.style.display = 'flex';
                placeholder.innerHTML = `<i class="fa-solid fa-cloud-arrow-up text-xl text-gray-400"></i><span class="text-[0.65rem] font-bold mt-1">Image ${index+1}</span>`;
            }

            document.getElementById('add-product-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!supabaseClient) {
                    alert("সিস্টেম পুরোপুরি প্রস্তুত নয় বা সুপাবেস কানেক্ট করা যায়নি।");
                    return;
                }

                const finalImages = uploadedImages.filter(url => url !== "");
                if (finalImages.length === 0) {
                    alert("অনুগ্রহ করে কমপক্ষে ১টি প্রোডাক্ট ইমেজ আপলোড করুন।");
                    return;
                }

                const sessionData = await supabaseClient.auth.getSession();
                const token = sessionData.data.session ? sessionData.data.session.access_token : null;

                if(!token) {
                    alert("আপনার এডমিন সেশন শেষ হয়েছে বা আপনি লগইন অবস্থায় নেই।");
                    return;
                }

                const payload = {
                    name: document.getElementById('product_name').value,
                    product_code: document.getElementById('product_code').value,
                    description: document.getElementById('description').value,
                    price: parseFloat(document.getElementById('regular_price').value),
                    customer_offer_price: document.getElementById('offer_price').value ? parseFloat(document.getElementById('offer_price').value) : null,
                    reseller_price: parseFloat(document.getElementById('reseller_price').value),
                    reseller_hold_bonus: parseFloat(document.getElementById('hold_bonus').value) || 0.0,
                    category_id: document.getElementById('category_id').value,
                    subcategory: document.getElementById('subcategory').value || null,
                    stock: parseInt(document.getElementById('stock').value),
                    sizes: document.getElementById('sizes').value || null,
                    colors: document.getElementById('colors').value || null,
                    warranty_type: document.querySelector('input[name="warranty"]:checked').value,
                    warranty_days: parseInt(document.getElementById('warranty_days').value) || 0,
                    images: finalImages
                };

                const submitBtn = document.getElementById('btn-submit');
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-xl"></i> পণ্যটি প্রসেসিং হচ্ছে...`;

                try {
                    const response = await fetch('/api/products/add', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    if (response.ok) {
                        alert("সাফল্য! পণ্যটি ডাটাবেজে সফলভাবে যোগ করা হয়েছে।");
                        window.location.href = "/dashboard/admin";
                    } else {
                        alert("পণ্য যোগ করতে সমস্যা হয়েছে: " + result.detail);
                    }
                } catch (err) {
                    alert("সার্ভার বা নেটওয়ার্ক কানেকশন ফেইলড।");
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> পণ্যটি ডাটাবেজে যুক্ত করুন`;
                }
            });

            initializeSupabase();
        });
    </script>
</body>
</html>
