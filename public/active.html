<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MerketBaseBD - Account Activation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        canvas: '#FAF6F4',
                        dark: '#111827',
                        muted: '#4B5563',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-canvas font-bangla text-dark min-h-screen flex items-center justify-center p-5 pb-12">

    <div class="w-full max-w-[480px] bg-white rounded-3xl border border-black/[0.02] p-8 md:p-10 shadow-xl shadow-primary/5 flex flex-col items-center">
        <div class="text-center mb-8">
            <a href="/" class="font-headings font-extrabold text-3xl text-primary tracking-tight">MerketBaseBD</a>
            <p class="text-sm text-muted mt-1">Premium Work & Earn Platform</p>
        </div>

        <div id="activation-card" class="w-full space-y-6 text-center">
            <i class="fa-solid fa-spinner animate-spin text-primary text-4xl block mx-auto"></i>
            <p class="text-sm text-muted">অ্যাক্টিভেশন স্ট্যাটাস যাচাই করা হচ্ছে...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let supabaseClient = null;
            let userId = null;

            async function initializeSupabase() {
                try {
                    const response = await fetch('/api/auth/config');
                    if (!response.ok) throw new Error("Config error");
                    const config = await response.json();
                    
                    if (config.supabase_url && config.supabase_anon_key) {
                        supabaseClient = window.supabase.createClient(config.supabase_url, config.supabase_anon_key);
                        verifyUserStatus(config.activation_fee);
                    }
                } catch (err) {
                    console.error("Supabase failed", err);
                }
            }

            async function verifyUserStatus(activationFee) {
                const card = document.getElementById('activation-card');
                try {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) {
                        window.location.href = "/login";
                        return;
                    }
                    userId = session.user.id;

                    const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
                    
                    if (!profile) return;

                    if (profile.is_active) {
                        window.location.href = "/dashboard/reseller";
                        return;
                    }

                    if (profile.activation_status === 'pending' && activationFee > 0) {
                        card.innerHTML = `
                            <div class="space-y-4">
                                <div class="w-16 h-16 bg-amber-500/10 text-amber-500 rounded-full flex items-center justify-center text-3xl mx-auto"><i class="fa-solid fa-hourglass-half animate-spin"></i></div>
                                <h3 class="text-xl font-bold text-dark">ভেরিফিকেশন পেন্ডিং!</h3>
                                <p class="text-sm text-muted leading-relaxed">আপনার পেমেন্ট ভেরিফিকেশন রিকোয়েস্টটি আমরা যাচাই করছি। সাধারণত ২-২৪ ঘণ্টার মধ্যে অ্যাকাউন্ট সচল করে দেওয়া হয়।</p>
                                <button onclick="window.location.reload()" class="w-full py-3 bg-primary text-white rounded-xl font-bold text-sm hover:bg-secondary transition-all flex items-center justify-center gap-2 shadow-md"><i class="fa-solid fa-rotate"></i> রিফ্রেশ করুন</button>
                            </div>
                        `;
                        return;
                    }

                    if (profile.activation_status === 'rejected') {
                        card.innerHTML = `
                            <div class="space-y-4">
                                <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-3xl mx-auto"><i class="fa-solid fa-circle-xmark"></i></div>
                                <h3 class="text-xl font-bold text-dark">পেমেন্ট বাতিল করা হয়েছে!</h3>
                                <p class="text-sm text-muted leading-relaxed">দুঃখিত, আপনার সাবমিট করা Trx ID টি সঠিক ছিল না। দয়া করে সঠিক পেমেন্ট সম্পন্ন করে পুনরায় তথ্য দিন।</p>
                            </div>
                        `;
                    }

                    renderActivationForm(activationFee);

                } catch (e) {
                    console.error("Status check failed", e);
                }
            }

            anti-injection-placeholder

            function renderActivationForm(fee) {
                const card = document.getElementById('activation-card');

                if (fee === 0) {
                    card.innerHTML = `
                        <div class="space-y-4">
                            <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center text-3xl mx-auto"><i class="fa-solid fa-key"></i></div>
                            <h3 class="text-xl font-bold text-dark">অ্যাকাউন্ট অ্যাক্টিভেশন</h3>
                            <p class="text-sm text-muted leading-relaxed">আপনার অ্যাকাউন্টটি বর্তমানে নিষ্ক্রিয় রয়েছে। নিচের বাটনে ক্লিক করে ফ্রিতে অ্যাক্টিভেশন সম্পন্ন করুন।</p>
                            <button onclick="requestFreeActivation()" id="btn-activate-free" class="w-full py-4 bg-primary text-white rounded-xl font-bold hover:bg-secondary transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2"><i class="fa-solid fa-circle-check"></i> অ্যাকাউন্ট একটিভ করুন (ফ্রি)</button>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="space-y-5 text-left">
                            <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center text-3xl mx-auto"><i class="fa-solid fa-lock"></i></div>
                            <h3 class="text-xl font-bold text-dark text-center">অ্যাকাউন্ট অ্যাক্টিভেশন</h3>
                            <p class="text-xs text-muted leading-relaxed text-center">রিসেলিং প্যানেল সচল করতে <strong>৳${fee}</strong> অ্যাক্টিভেশন ফি প্রদান করা আবশ্যক।</p>
                            
                            <div class="p-4 bg-gray-50 border border-gray-150 rounded-2xl text-xs space-y-1">
                                <p class="font-bold text-dark">পেমেন্ট করার নিয়মাবলী:</p>
                                <p class="text-muted">১. বিকাশ/নগদ পার্সোনাল নম্বরে <strong>সেন্ড মানি</strong> করুন: <strong class="text-primary font-body">017XXXXXXXX</strong></p>
                                <p class="text-muted">২. টাকা পাঠানো সম্পন্ন হলে নিচের ফর্মে ট্রানজেকশন তথ্য দিন।</p>
                            </div>

                            <form id="activation-payment-form" class="space-y-4">
                                <div>
                                    <label class="block font-semibold text-xs mb-1 text-dark">পেমেন্ট গেটওয়ে</label>
                                    <select id="method" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-xs outline-none focus:border-primary text-dark font-bold" required>
                                        <option value="bKash">bKash (বিকাশ)</option>
                                        <option value="Nagad">Nagad (নগদ)</option>
                                    </select>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block font-semibold text-xs mb-1 text-dark">প্রেরক মোবাইল নম্বর</label>
                                        <input type="text" id="sender_no" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-xs outline-none focus:border-primary text-dark font-body" placeholder="017XXXXXXXX" required>
                                    </div>
                                    <div>
                                        <label class="block font-semibold text-xs mb-1 text-dark">Transaction ID (TrxID)</label>
                                        <input type="text" id="trx_id" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-xs outline-none focus:border-primary text-dark font-mono uppercase" placeholder="AX627BKD9" required>
                                    </div>
                                </div>
                                <button type="submit" id="btn-submit" class="w-full py-3.5 bg-primary text-white rounded-xl font-bold hover:bg-secondary transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2 text-sm"><i class="fa-solid fa-circle-check"></i> তথ্য সাবমিট করুন</button>
                            </form>
                        </div>
                    `;

                    document.getElementById('activation-payment-form').addEventListener('submit', requestPaidActivation);
                }
            }

            window.requestFreeActivation = async function() {
                const btn = document.getElementById('btn-activate-free');
                btn.disabled = true;
                btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> প্রসেসিং হচ্ছে...`;

                try {
                    const response = await fetch('/api/auth/request-activation', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId })
                    });
                    const result = await response.json();
                    if (response.ok) {
                        alert(result.message);
                        window.location.href = "/dashboard/reseller";
                    } else {
                        alert("ত্রুটি: " + result.detail);
                    }
                } catch (e) {
                    alert("সার্ভার কানেকশন এরর।");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> অ্যাকাউন্ট একটিভ করুন (ফ্রি)`;
                }
            }

            async function requestPaidActivation(e) {
                e.preventDefault();
                const btn = document.getElementById('btn-submit');
                btn.disabled = true;
                btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> প্রসেসিং হচ্ছে...`;

                const payload = {
                    user_id: userId,
                    payment_method: document.getElementById('method').value,
                    sender_number: document.getElementById('sender_no').value.trim(),
                    trx_id: document.getElementById('trx_id').value.trim()
                };

                try {
                    const response = await fetch('/api/auth/request-activation', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (response.ok) {
                        alert(result.message);
                        window.location.reload();
                    } else {
                        alert("ত্রুটি: " + result.detail);
                    }
                } catch (e) {
                    alert("সার্ভার কানেকশন ফেইলড।");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> তথ্য সাবমিট করুন`;
                }
            }

            initializeSupabase();
        });
    </script>
</body>
</html>
