<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MartBaseBD - লগইন করুন</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        canvas: '#FAF6F4',
                        dark: '#111827',
                        muted: '#4B5563',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-canvas font-bangla text-dark min-h-screen flex items-center justify-center p-5">

    <div class="w-full max-w-[450px] bg-white rounded-2xl border border-black/[0.02] p-8 md:p-10 shadow-xl shadow-primary/5">
        <!-- Brand logo -->
        <div class="text-center mb-8">
            <a href="/" class="font-headings font-extrabold text-3xl text-primary tracking-tight">MartBaseBD</a>
            <p class="text-sm text-muted mt-1">Premium Work & Earn Platform</p>
        </div>

        <h3 class="text-xl font-bold text-center mb-6 text-dark flex items-center justify-center gap-2"><i class="fa-solid fa-lock text-primary"></i> অ্যাকাউন্টে প্রবেশ করুন</h3>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block font-semibold text-sm mb-2 text-dark">ইমেইল ঠিকানা</label>
                <input type="email" id="email" class="w-full px-4 py-3 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="example@domain.com" required>
            </div>

            <div>
                <label class="block font-semibold text-sm mb-2 text-dark">পাসওয়ার্ড</label>
                <input type="password" id="password" class="w-full px-4 py-3 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all" placeholder="আপনার পাসওয়ার্ড লিখুন" required>
            </div>

            <button type="submit" class="w-full py-3.5 bg-primary text-white rounded-xl font-semibold hover:bg-secondary transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2"><i class="fa-solid fa-right-to-bracket"></i> লগইন করুন</button>
        </form>

        <div class="text-center mt-6 text-sm text-muted space-y-2">
            <p>নতুন অ্যাকাউন্ট খুলতে চান? <a href="/signup" class="text-primary font-semibold hover:underline">ক্রেতা সাইনআপ</a> অথবা <a href="/signup/reseller" class="text-primary font-semibold hover:underline">রিসেলার সাইনআপ</a></p>
            <p><a href="/" class="text-gray-500 hover:text-primary transition-colors"><i class="fa-solid fa-arrow-left"></i> হোমে ফিরে যান</a></p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const supabaseUrl = 'YOUR_SUPABASE_URL';
            const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
            let supabase = null;

            try {
                if (supabaseUrl && supabaseUrl !== 'YOUR_SUPABASE_URL') {
                    supabase = supabaseJS.createClient(supabaseUrl, supabaseKey);
                } else {
                    console.warn("Supabase credentials are placeholder values.");
                }
            } catch (err) {
                console.error("Supabase fail", err);
            }

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!supabase) {
                    alert("Supabase কনফিগারেশন করা হয়নি। অনুগ্রহ করে Vercel-এ API Key সেট করুন।");
                    return;
                }

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) {
                        alert("ভুল ইমেইল বা পাসওয়ার্ড: " + error.message);
                        return;
                    }

                    if (data.user) {
                        // ইউজার রোল যাচাই করা
                        const { data: profile, error: profileError } = await supabase
                            .from('profiles')
                            .select('role')
                            .eq('id', data.user.id)
                            .single();

                        if (profileError) {
                            alert("প্রোফাইল যাচাই করতে সমস্যা হয়েছে: " + profileError.message);
                            return;
                        }

                        // রোলের ভিত্তিতে সঠিক পেজে পাঠানো
                        if (profile.role === 'reseller') {
                            window.location.href = "/dashboard/reseller";
                        } else {
                            window.location.href = "/";
                        }
                    }
                } catch (err) {
                    alert("লগইন ব্যর্থ হয়েছে: " + err.message);
                }
            });
        });
    </script>
</body>
</html>
