<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MerketBaseBD - লগইন করুন</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        dark: '#111827',
                        muted: '#6B7280',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    },
                    animation: {
                        'gradient-bg': 'gradient-bg 10s ease infinite',
                        'float-slow': 'float-slow 8s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        'gradient-bg': {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        },
                        'float-slow': {
                            '0%, 100%': { transform: 'translateY(0) scale(1)' },
                            '50%': { transform: 'translateY(-15px) scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* অ্যানিমেটেড গ্রেডিয়েন্ট ব্যাকগ্রাউন্ডের জন্য */
        .animated-bg {
            background: linear-gradient(-45deg, #FF6B00, #FF8C33, #FFA057, #E05300);
            background-size: 400% 400%;
        }
    </style>
</head>
<body class="animated-bg animate-gradient-bg font-bangla text-dark min-h-screen flex items-center justify-center p-5 relative overflow-hidden">

    <!-- ব্যাকগ্রাউন্ডের জন্য এক্সট্রা ইফেক্টিভ গ্লোয়িং অবজেক্টস -->
    <div class="absolute top-10 left-10 w-72 h-72 bg-white/10 rounded-full blur-3xl animate-float-slow"></div>
    <div class="absolute bottom-10 right-10 w-80 h-80 bg-black/10 rounded-full blur-3xl animate-float-slow" style="animation-delay: -3s;"></div>

    <!-- মেইন কার্ড (Glassmorphic & Micro-interactions) -->
    <div class="w-full max-w-[450px] bg-white/95 backdrop-blur-md rounded-3xl border border-white/20 p-8 md:p-10 shadow-2xl shadow-black/20 relative overflow-hidden transform transition-all duration-300 hover:shadow-black/30">
        
        <!-- ভেতরে সফট ব্যাকগ্রাউন্ড গ্লো -->
        <div class="absolute -top-16 -left-16 w-32 h-32 bg-primary/20 rounded-full blur-2xl animate-pulse-slow"></div>
        <div class="absolute -bottom-16 -right-16 w-32 h-32 bg-secondary/20 rounded-full blur-2xl animate-pulse-slow" style="animation-delay: 2s;"></div>

        <!-- ব্র্যান্ড লোগো -->
        <div class="text-center mb-8 relative z-10">
            <a href="/" class="font-headings font-extrabold text-3xl text-primary tracking-tight block hover:scale-105 transition-transform duration-300">MerketBaseBD</a>
            <p class="text-[10px] text-muted mt-1.5 uppercase tracking-widest font-bold bg-primary/5 py-1 px-3 rounded-full inline-block">Premium Work & Earn Platform</p>
        </div>

        <h3 class="text-xl font-bold text-center mb-6 text-dark flex items-center justify-center gap-2 relative z-10">
            <i class="fa-solid fa-key text-primary animate-bounce"></i> অ্যাকাউন্টে প্রবেশ করুন
        </h3>

        <form id="login-form" class="space-y-5 relative z-10">
            <!-- ইমেইল ইনপুট -->
            <div>
                <label class="block font-bold text-xs mb-1.5 text-dark/80">ইমেইল ঠিকানা</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" class="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium" placeholder="example@domain.com" required>
                </div>
            </div>

            <!-- পাসওয়ার্ড ইনপুট -->
            <div>
                <label class="block font-bold text-xs mb-1.5 text-dark/80">পাসওয়ার্ড</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" class="w-full pl-11 pr-11 py-3 bg-gray-50/50 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium" placeholder="আপনার পাসওয়ার্ড লিখুন" required>
                    
                    <!-- শো/হাইড বাটন -->
                    <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center active:scale-90 transition-transform">
                        <i class="fa-solid fa-eye text-gray-400 text-sm hover:text-primary transition-colors" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <!-- সাবমিট বাটন উইথ এফেক্টস -->
            <button type="submit" class="w-full py-3.5 bg-primary text-white rounded-xl font-bold hover:bg-secondary active:scale-[0.99] transition-all duration-150 shadow-lg shadow-primary/20 flex items-center justify-center gap-2 text-sm relative overflow-hidden group">
                <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></span>
                <i class="fa-solid fa-right-to-bracket transition-transform group-hover:translate-x-1"></i> লগইন করুন
            </button>
        </form>

        <!-- ফুটার লিংকসমূহ -->
        <div class="text-center mt-8 text-xs text-muted space-y-3 relative z-10 border-t border-gray-100 pt-5">
            <p>নতুন অ্যাকাউন্ট খুলতে চান? <br class="sm:hidden"> <a href="/signup" class="text-primary font-bold hover:underline">কাস্টমার সাইনআপ</a> অথবা <a href="/signup/reseller" class="text-primary font-bold hover:underline">ওয়ার্কার সাইনআপ</a></p>
            <p><a href="/" class="text-gray-400 hover:text-primary transition-colors font-bold inline-flex items-center gap-1"><i class="fa-solid fa-arrow-left-long"></i> হোমে ফিরে যান</a></p>
        </div>
    </div>

    <!-- Shimmer Keyframe Injection for Button -->
    <style>
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>

    <!-- Supabase SDK & Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let supabaseClient = null;

            // --- ক. সুপাবেস ডাইনামিক ইনিশিয়ালাইজেশন ---
            async function initializeSupabase() {
                try {
                    const response = await fetch('/api/auth/config');
                    if (!response.ok) throw new Error("Config fetch failed");
                    const config = await response.json();
                    
                    if (config.supabase_url && config.supabase_anon_key) {
                        supabaseClient = window.supabase.createClient(config.supabase_url, config.supabase_anon_key);
                        console.log("Supabase Client initialized successfully.");
                    }
                } catch (err) {
                    console.error("Supabase failed to initialize:", err);
                }
            }

            initializeSupabase();

            // --- খ. পাসওয়ার্ড শো/হাইড ইন্টারেক্টিভ লজিক ---
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('toggle-password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput && togglePasswordBtn && eyeIcon) {
                togglePasswordBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const isPassword = passwordInput.getAttribute('type') === 'password';
                    passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                    
                    if (isPassword) {
                        eyeIcon.className = "fa-solid fa-eye-slash text-primary text-sm";
                    } else {
                        eyeIcon.className = "fa-solid fa-eye text-gray-400 text-sm";
                    }
                });
            }

            // --- গ. লগইন ফর্ম সাবমিট প্রসেসিং ---
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!supabaseClient) {
                    alert("সিস্টেম পুরোপুরি প্রস্তুত নয় বা সুপাবেস কানেক্ট করা যায়নি। অনুগ্রহ করে Vercel-এ এনভায়রনমেন্ট ভেরিয়েবল চেক করুন।");
                    return;
                }

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) {
                        alert("লগইন ব্যর্থ হয়েছে: " + error.message);
                        return;
                    }

                    if (data.user) {
                        const { data: profile, error: profileError } = await supabaseClient
                            .from('profiles')
                            .select('role')
                            .eq('id', data.user.id)
                            .single();

                        if (profileError) {
                            alert("ইউজার ডাটা যাচাই করতে ত্রুটি হয়েছে: " + profileError.message);
                            return;
                        }

                        if (profile.role === 'reseller') {
                            window.location.href = "/dashboard/reseller";
                        } else if (profile.role === 'admin') {
                            window.location.href = "/dashboard/admin";
                        } else {
                            window.location.href = "/";
                        }
                    }
                } catch (err) {
                    alert("একটি অপ্রত্যাশিত ত্রুটি ঘটেছে: " + err.message);
                }
            });
        });
    </script>
</body>
</html>
