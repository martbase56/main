<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MartBaseBD - লগইন করুন</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        canvas: '#FAF6F4',
                        dark: '#111827',
                        muted: '#4B5563',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-canvas font-bangla text-dark min-h-screen flex items-center justify-center p-5">

    <div class="w-full max-w-[450px] bg-white rounded-2xl border border-black/[0.02] p-8 md:p-10 shadow-xl shadow-primary/5">
        <!-- Brand logo -->
        <div class="text-center mb-8">
            <a href="/" class="font-headings font-extrabold text-3xl text-primary tracking-tight">MartBaseBD</a>
            <p class="text-sm text-muted mt-1">Premium Work & Earn Platform</p>
        </div>

        <h3 class="text-xl font-bold text-center mb-6 text-dark flex items-center justify-center gap-2">
            <i class="fa-solid fa-lock text-primary"></i> অ্যাকাউন্টে প্রবেশ করুন
        </h3>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block font-semibold text-sm mb-2 text-dark">イমেইল ঠিকানা</label>
                <input type="email" id="email" class="w-full px-4 py-3 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all text-dark" placeholder="example@domain.com" required>
            </div>

            <div>
                <label class="block font-semibold text-sm mb-2 text-dark">পাসওয়ার্ড</label>
                <input type="password" id="password" class="w-full px-4 py-3 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all text-dark" placeholder="আপনার পাসওয়ার্ড লিখুন" required>
            </div>

            <button type="submit" class="w-full py-3.5 bg-primary text-white rounded-xl font-semibold hover:bg-secondary transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> লগইন করুন
            </button>
        </form>

        <div class="text-center mt-6 text-sm text-muted space-y-2">
            <p>নতুন অ্যাকাউন্ট খুলতে চান? <a href="/signup" class="text-primary font-semibold hover:underline">ক্রেতা সাইনআপ</a> অথবা <a href="/signup/reseller" class="text-primary font-semibold hover:underline">রিসেলার সাইনআপ</a></p>
            <p><a href="/" class="text-gray-500 hover:text-primary transition-colors"><i class="fa-solid fa-arrow-left"></i> হোমে ফিরে যান</a></p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // গ্লোবাল ভেরিয়েবল কনফ্লিক্ট এড়াতে সংশোধিত অবজেক্ট
            let supabaseClient = null;

            // --- ক. ব্যাকএন্ড থেকে ডাইনামিক সুপাবেস কনফিগ নিয়ে আসা ---
            async function initializeSupabase() {
                try {
                    const response = await fetch('/api/auth/config');
                    if (!response.ok) throw new Error("Config fetch failed");
                    const config = await response.json();
                    
                    if (config.supabase_url && config.supabase_anon_key) {
                        // window.supabase ব্যবহার করে ইনিশিয়ালাইজেশন করা হয়েছে
                        supabaseClient = window.supabase.createClient(config.supabase_url, config.supabase_anon_key);
                        console.log("Supabase Client initialized successfully.");
                    } else {
                        console.warn("Credentials missing in env variables.");
                    }
                } catch (err) {
                    console.error("Supabase failed to initialize:", err);
                }
            }

            initializeSupabase();

            // --- খ. লগইন ফর্ম হ্যান্ডলিং ---
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!supabaseClient) {
                    alert("সিস্টেম পুরোপুরি প্রস্তুত নয় বা সুপাবেস কানেক্ট করা যায়নি। অনুগ্রহ করে Vercel-এ এনভায়রনমেন্ট ভেরিয়েবল চেক করুন।");
                    return;
                }

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) {
                        alert("লগইন ব্যর্থ হয়েছে: " + error.message);
                        return;
                    }

                    if (data.user) {
                        // ডাটাবেজের profiles টেবিল থেকে ইউজারের রোল (role) বের করা
                        const { data: profile, error: profileError } = await supabaseClient
                            .from('profiles')
                            .select('role')
                            .eq('id', data.user.id)
                            .single();

                        if (profileError) {
                            alert("ইউজার ডাটা যাচাই করতে ত্রুটি হয়েছে: " + profileError.message);
                            return;
                        }

                        // রোলের ভিত্তিতে রিডাইরেকশন
                        if (profile.role === 'reseller') {
                            window.location.href = "/dashboard/reseller";
                        } else if (profile.role === 'admin') {
                            window.location.href = "/dashboard/admin";
                        } else {
                            window.location.href = "/";
                        }
                    }
                } catch (err) {
                    alert("একটি অপ্রত্যাশিত ত্রুটি ঘটেছে: " + err.message);
                }
            });
        });
    </script>
</body>
</html>
