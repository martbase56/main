<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MerketBaseBD - লগইন করুন</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        canvas: '#FAF6F4',
                        dark: '#111827',
                        muted: '#4B5563',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-canvas font-bangla text-dark min-h-screen flex items-center justify-center p-5">

    <div class="w-full max-w-[450px] bg-white rounded-3xl border border-black/[0.02] p-8 md:p-10 shadow-xl shadow-primary/5 relative overflow-hidden">
        <!-- Background Soft Orbs -->
        <div class="absolute -top-16 -left-16 w-32 h-32 bg-primary/10 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-16 -right-16 w-32 h-32 bg-secondary/10 rounded-full blur-2xl"></div>

        <!-- Brand logo -->
        <div class="text-center mb-8 relative z-10">
            <a href="/" class="font-headings font-extrabold text-3xl text-primary tracking-tight">MerketBaseBD</a>
            <p class="text-xs text-muted mt-1 uppercase tracking-wider font-semibold">Premium Work & Earn Platform</p>
        </div>

        <h3 class="text-xl font-bold text-center mb-6 text-dark flex items-center justify-center gap-2 relative z-10">
            <i class="fa-solid fa-key text-primary"></i> অ্যাকাউন্টে প্রবেশ করুন
        </h3>

        <form id="login-form" class="space-y-5 relative z-10">
            <!-- Email Input with FA Icon inside -->
            <div>
                <label class="block font-bold text-xs mb-1.5 text-dark">ইমেইল ঠিকানা</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium" placeholder="example@domain.com" required>
                </div>
            </div>

            <!-- Password Input with FA Icon and Show/Hide Toggle inside [1.1] -->
            <div>
                <label class="block font-bold text-xs mb-1.5 text-dark">পাসওয়ার্ড</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" class="w-full pl-11 pr-11 py-3 border border-gray-200 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium" placeholder="আপনার পাসওয়ার্ড লিখুন" required>
                    
                    <!-- Show/Hide Button with Eye Icon [1.1] -->
                    <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center active:scale-95 transition-transform">
                        <i class="fa-solid fa-eye text-gray-400 text-sm" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 bg-primary text-white rounded-xl font-bold hover:bg-secondary transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2 text-sm">
                <i class="fa-solid fa-right-to-bracket animate-pulse"></i> লগইন করুন
            </button>
        </form>

        <div class="text-center mt-8 text-xs text-muted space-y-3 relative z-10">
            <p>নতুন অ্যাকাউন্ট খুলতে চান? <a href="/signup" class="text-primary font-bold hover:underline">কাস্টমার সাইনআপ</a> অথবা <a href="/signup/reseller" class="text-primary font-bold hover:underline">ওয়ার্কার সাইনআপ</a></p>
            <p><a href="/" class="text-gray-500 hover:text-primary transition-colors font-bold"><i class="fa-solid fa-arrow-left-long"></i> হোমে ফিরে যান</a></p>
        </div>
    </div>

    <!-- Supabase SDK & Global Layout -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let supabaseClient = null;

            // --- ক. সুপাবেস ডাইনামিক ইনিশিয়ালাইজেশন ---
            async function initializeSupabase() {
                try {
                    const response = await fetch('/api/auth/config');
                    if (!response.ok) throw new Error("Config fetch failed");
                    const config = await response.json();
                    
                    if (config.supabase_url && config.supabase_anon_key) {
                        supabaseClient = window.supabase.createClient(config.supabase_url, config.supabase_anon_key);
                        console.log("Supabase Client initialized successfully.");
                    }
                } catch (err) {
                    console.error("Supabase failed to initialize:", err);
                }
            }

            initializeSupabase();

            // --- খ. পাসওয়ার্ড শো/হাইড ইন্টারেক্টিভ লজিক [1.1] ---
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('toggle-password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput && togglePasswordBtn && eyeIcon) {
                togglePasswordBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // টাইপ পরিবর্তন
                    const isPassword = passwordInput.getAttribute('type') === 'password';
                    passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                    
                    // আইকন পরিবর্তন [1.1]
                    if (isPassword) {
                        eyeIcon.className = "fa-solid fa-eye-slash text-primary text-sm";
                    } else {
                        eyeIcon.className = "fa-solid fa-eye text-gray-400 text-sm";
                    }
                });
            }

            // --- গ. লগইন ফর্ম সাবমিট প্রসেসিং ---
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!supabaseClient) {
                    alert("সিস্টেম পুরোপুরি প্রস্তুত নয় বা সুপাবেস কানেক্ট করা যায়নি। অনুগ্রহ করে Vercel-এ এনভায়রনমেন্ট ভেরিয়েবল চেক করুন।");
                    return;
                }

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) {
                        alert("লগইন ব্যর্থ হয়েছে: " + error.message);
                        return;
                    }

                    if (data.user) {
                        const { data: profile, error: profileError } = await supabaseClient
                            .from('profiles')
                            .select('role')
                            .eq('id', data.user.id)
                            .single();

                        if (profileError) {
                            alert("ইউজার ডাটা যাচাই করতে ত্রুটি হয়েছে: " + profileError.message);
                            return;
                        }

                        // রোলের ভিত্তিতে ড্যাশবোর্ড রিডাইরেকশন
                        if (profile.role === 'reseller') {
                            window.location.href = "/dashboard/reseller";
                        } else if (profile.role === 'admin') {
                            window.location.href = "/dashboard/admin";
                        } else {
                            window.location.href = "/";
                        }
                    }
                } catch (err) {
                    alert("একটি অপ্রত্যাশিত ত্রুটি ঘটেছে: " + err.message);
                }
            });
        });
    </script>
</body>
</html>
