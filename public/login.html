<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MerketBaseBD - লগইন করুন</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;600;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B00',
                        secondary: '#FF8C33',
                        canvas: '#FAF6F4',
                        dark: '#111827',
                        muted: '#4B5563',
                    },
                    fontFamily: {
                        bangla: ['"Anek Bangla"', 'sans-serif'],
                        headings: ['"Bricolage Grotesque"', 'sans-serif'],
                        body: ['"Rubik"', 'sans-serif'],
                    },
                    animation: {
                        'gradient-bg': 'gradient-bg 8s linear infinite',
                        'card-float': 'card-float 6s ease-in-out infinite',
                        'grid-move': 'grid-move 20s linear infinite',
                    },
                    keyframes: {
                        'gradient-bg': {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        },
                        'card-float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'grid-move': {
                            '0%': { 'background-position': '0 0' },
                            '100%': { 'background-position': '40px 40px' },
                        },
                    },
                }
            }
        }
    </script>
    
    <style>
        /* কার্ডের জন্য কাস্টম অ্যানিমেটেড গ্রেডিয়েন্ট এবং প্যাটার্ন */
        .card-bg-animated {
            background: linear-gradient(135deg, #FF6B00, #FF8C33, #FF6B00, #E05300);
            background-size: 300% 300%;
            animation: gradient-bg 8s linear infinite;
        }

        .card-grid-overlay {
            background-image: linear-gradient(#ffffff1a 1px, transparent 1px),
                              linear-gradient(90deg, #ffffff1a 1px, transparent 1px);
            background-size: 20px 20px;
            animation: grid-move 20s linear infinite;
        }

        /* সূক্ষ্ম বর্ডার গ্লো ইফেক্ট */
        .card-glow:hover {
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.4);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-canvas font-bangla text-dark min-h-screen flex items-center justify-center p-5 relative overflow-hidden">

    <!-- পেজের ব্যাকগ্রাউন্ডে সফট অব্জেক্টস (পূর্বের মতো) -->
    <div class="absolute -top-32 -left-32 w-80 h-80 bg-primary/10 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-32 -right-32 w-80 h-80 bg-secondary/10 rounded-full blur-[120px]"></div>

    <!-- মেইন এনিমেশন কার্ড (নতুন ডিজাইন) -->
    <div class="w-full max-w-[480px] bg-white rounded-3xl p-2 shadow-2xl shadow-primary/10 relative card-glow transition-all duration-500 ease-out animate-card-float hover:shadow-primary/20 overflow-hidden border border-black/[0.03]">
        
        <!-- নতুন এনিমেটেড ব্যাকগ্রাউন্ড লেয়ার -->
        <div class="absolute inset-0 card-bg-animated rounded-3xl opacity-90"></div>
        <div class="absolute inset-0 card-grid-overlay rounded-3xl opacity-30"></div>

        <!-- মূল কন্টেন্ট প্যানেল (Glassmorphic) -->
        <div class="bg-white/95 backdrop-blur-sm rounded-[20px] p-8 md:p-10 relative z-10 border border-white/50">
            
            <!-- ব্র্যান্ড লোগো -->
            <div class="text-center mb-8 relative z-10">
                <a href="/" class="font-headings font-extrabold text-3xl text-primary tracking-tight">MerketBaseBD</a>
                <p class="text-xs text-muted mt-1 uppercase tracking-wider font-semibold">Premium Work & Earn Platform</p>
            </div>

            <h3 class="text-xl font-bold text-center mb-6 text-dark flex items-center justify-center gap-2 relative z-10">
                <i class="fa-solid fa-key text-primary animate-pulse"></i> অ্যাকাউন্টে প্রবেশ করুন
            </h3>

            <form id="login-form" class="space-y-5 relative z-10">
                <!-- ইমেইল ইনপুট -->
                <div>
                    <label class="block font-bold text-xs mb-1.5 text-dark/80">ইমেইল ঠিকানা</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" id="email" class="w-full pl-11 pr-4 py-3 bg-white border border-gray-100 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium" placeholder="example@domain.com" required>
                    </div>
                </div>

                <!-- পাসওয়ার্ড ইনপুট -->
                <div>
                    <label class="block font-bold text-xs mb-1.5 text-dark/80">পাসওয়ার্ড</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="password" class="w-full pl-11 pr-11 py-3 bg-white border border-gray-100 rounded-xl font-body text-[0.95rem] outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium" placeholder="আপনার পাসওয়ার্ড লিখুন" required>
                        
                        <!-- শো/হাইড বাটন -->
                        <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center active:scale-95 transition-transform">
                            <i class="fa-solid fa-eye text-gray-400 text-sm hover:text-primary transition-colors" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- সাবমিট বাটন -->
                <button type="submit" class="w-full py-3.5 bg-primary text-white rounded-xl font-bold hover:bg-secondary active:scale-[0.98] transition-all duration-150 shadow-lg shadow-primary/20 flex items-center justify-center gap-2.5 text-sm relative overflow-hidden group">
                    <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-shimmer"></span>
                    <i class="fa-solid fa-right-to-bracket transition-transform group-hover:translate-x-1"></i> লগইন করুন
                </button>
            </form>

            <!-- ফুটার লিংকসমূহ -->
            <div class="text-center mt-8 text-xs text-muted space-y-3 relative z-10 border-t border-gray-100 pt-5">
                <p>নতুন অ্যাকাউন্ট খুলতে চান? <a href="/signup" class="text-primary font-bold hover:underline">কাস্টমার সাইনআপ</a> অথবা <a href="/signup/reseller" class="text-primary font-bold hover:underline">ওয়ার্কার সাইনআপ</a></p>
                <p><a href="/" class="text-gray-500 hover:text-primary transition-colors font-bold inline-flex items-center gap-1.5"><i class="fa-solid fa-arrow-left-long"></i> হোমে ফিরে যান</a></p>
            </div>
        </div>
    </div>

    <!-- Shimmer Keyframe Injection for Button -->
    <style>
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
        .group-hover\:animate-shimmer:hover .group-hover\:animate-shimmer {
            animation: shimmer 1s;
        }
        /* Custom shorthand is not working with CDN, so added directly */
        .group:hover .group-hover\:animate-shimmer {
             animation: shimmer 1s;
        }
    </style>

    <!-- Supabase SDK & Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let supabaseClient = null;

            // --- ক. সুপাবেস ডাইনামিক ইনিশিয়ালাইজেশন ---
            async function initializeSupabase() {
                try {
                    const response = await fetch('/api/auth/config');
                    if (!response.ok) throw new Error("Config fetch failed");
                    const config = await response.json();
                    
                    if (config.supabase_url && config.supabase_anon_key) {
                        supabaseClient = window.supabase.createClient(config.supabase_url, config.supabase_anon_key);
                        console.log("Supabase Client initialized successfully.");
                    }
                } catch (err) {
                    console.error("Supabase failed to initialize:", err);
                }
            }

            initializeSupabase();

            // --- খ. পাসওয়ার্ড শো/হাইড ইন্টারেক্টিভ লজিক ---
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('toggle-password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput && togglePasswordBtn && eyeIcon) {
                togglePasswordBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const isPassword = passwordInput.getAttribute('type') === 'password';
                    passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                    
                    if (isPassword) {
                        eyeIcon.className = "fa-solid fa-eye-slash text-primary text-sm";
                    } else {
                        eyeIcon.className = "fa-solid fa-eye text-gray-400 text-sm";
                    }
                });
            }

            // --- গ. লগইন ফর্ম সাবমিট প্রসেসিং ---
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!supabaseClient) {
                    alert("সিস্টেম পুরোপুরি প্রস্তুত নয় বা সুপাবেস কানেক্ট করা যায়নি। অনুগ্রহ করে Vercel-এ এনভায়রনমেন্ট ভেরিয়েবল চেক করুন।");
                    return;
                }

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) {
                        alert("লগইন ব্যর্থ হয়েছে: " + error.message);
                        return;
                    }

                    if (data.user) {
                        const { data: profile, error: profileError } = await supabaseClient
                            .from('profiles')
                            .select('role')
                            .eq('id', data.user.id)
                            .single();

                        if (profileError) {
                            alert("ইউজার ডাটা যাচাই করতে ত্রুটি হয়েছে: " + profileError.message);
                            return;
                        }

                        if (profile.role === 'reseller') {
                            window.location.href = "/dashboard/reseller";
                        } else if (profile.role === 'admin') {
                            window.location.href = "/dashboard/admin";
                        } else {
                            window.location.href = "/";
                        }
                    }
                } catch (err) {
                    alert("একটি অপ্রত্যাশিত ত্রুটি ঘটেছে: " + err.message);
                }
            });
        });
    </script>
</body>
</html>
