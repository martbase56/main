<head>

    <title>MerketBaseBD - ওয়ার্কার রেজিস্ট্রেশন</title>

        tailwind.config = {

</head>
<body class="bg-[#FAF9F6] bg-grid-pattern font-bangla text-dark min-h-screen flex items-center justify-center p-4 md:p-8 relative overflow-x-hidden">

    <!-- Decorative Animated Glowing Blobs -->

    <!-- Main Container -->

        <!-- Header Section -->
        <div class="text-center mb-8">
            <a href="/" class="font-headings font-extrabold text-3xl text-primary tracking-tight block hover:scale-102 transition-all">MerketBaseBD</a>
            <p class="text-[11px] text-muted mt-1.5 uppercase tracking-wider font-bold bg-primary/5 py-1 px-3 rounded-full inline-block">Premium Work & Earn Platform</p>

            </h3>
        </div>

        <!-- Multi-Step Progress Tracker -->

            <div class="h-0.5 w-10 bg-gray-200" id="step-divider"></div>
            <div id="step-2-indicator" class="flex items-center gap-2 px-4 py-2 rounded-full bg-gray-100 text-muted text-xs font-bold transition-all duration-300">

        </div>

        <form id="worker-signup-form" class="space-y-6">
            
            <!-- ================= STEP 1: ACCOUNT DETAILS ================= -->

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- Name Input -->
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors pointer-events-none">
                            <i class="fa-solid fa-user text-sm"></i>
                        </span>
                        <input type="text" id="fullname" required placeholder=" " class="peer w-full pl-11 pr-4 py-3.5 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm">
                        <label for="fullname" class="absolute left-11 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:-top-2 peer-focus:translate-y-0 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:translate-y-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">সম্পূর্ণ নাম</label>
                    </div>

                    <!-- Email Input -->
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors pointer-events-none">

                        </span>
                        <input type="email" id="email" required placeholder=" " class="peer w-full pl-11 pr-4 py-3.5 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm">
                        <label for="email" class="absolute left-11 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:-top-2 peer-focus:translate-y-0 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:translate-y-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">ইমেইল ঠিকানা</label>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- Phone Input -->
                    <div class="relative group">

                            <i class="fa-solid fa-phone text-sm"></i>
                        </span>
                        <input type="tel" id="phone" required placeholder=" " class="peer w-full pl-11 pr-4 py-3.5 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm">
                        <label for="phone" class="absolute left-11 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:-top-2 peer-focus:translate-y-0 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:translate-y-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">মোবাইল নম্বর</label>

                    <!-- Password Input -->

                        </span>
                        <input type="password" id="password" required placeholder=" " class="peer w-full pl-11 pr-4 py-3.5 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm">
                        <label for="password" class="absolute left-11 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:-top-2 peer-focus:translate-y-0 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:translate-y-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">পাসওয়ার্ড দিন</label>
                    </div>

                <!-- Refer Code Input -->
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors pointer-events-none">
                        <i class="fa-solid fa-gift text-sm"></i>
                    </span>
                    <input type="number" id="referred_by" placeholder=" " class="peer w-full pl-11 pr-4 py-3.5 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm">
                    <label for="referred_by" class="absolute left-11 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:-top-2 peer-focus:translate-y-0 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:translate-y-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">রেফার কোড (ঐচ্ছিক)</label>
                </div>

                <!-- Next Button -->
                <button type="button" id="btn-next" class="w-full py-4 bg-gradient-to-r from-primary to-orange-500 text-white rounded-2xl font-bold hover:opacity-95 active:scale-[0.99] transition-all shadow-lg shadow-orange-500/10 flex items-center justify-center gap-2 text-sm">
                    পরবর্তী ধাপ <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <!-- ================= STEP 2: USER ADDITIONAL DATA ================= -->
            <div id="form-step-2" class="space-y-5 hidden transition-all duration-300">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">                    <!-- Age Input -->
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors pointer-events-none">
                            <i class="fa-solid fa-calendar text-sm"></i>
                        </span>
                        <input type="number" id="age" min="15" placeholder=" " class="peer w-full pl-11 pr-4 py-3.5 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm">
                        <label for="age" class="absolute left-11 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:-top-2 peer-focus:translate-y-0 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:translate-y-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">বয়স</label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- City/District Input (Sorua/Sohor) -->
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors pointer-events-none">
                            <i class="fa-solid fa-city text-sm"></i>
                        </span>
                        <input type="text" id="city" placeholder=" " class="peer w-full pl-11 pr-4 py-3.5 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm">
                        <label for="city" class="absolute left-11 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:-top-2 peer-focus:translate-y-0 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:translate-y-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">শহর / জেলা</label>
                    </div>

                    <!-- Facebook Profile Link -->
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary transition-colors pointer-events-none">
                            <i class="fa-brands fa-facebook text-sm"></i>
                        </span>
                        <input type="url" id="fb_link" placeholder=" " class="peer w-full pl-11 pr-4 py-3.5 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm">
                        <label for="fb_link" class="absolute left-11 top-1/2 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:-top-2 peer-focus:translate-y-0 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:translate-y-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">ফেসবুক আইডি লিঙ্ক (ঐচ্ছিক)</label>
                    </div>
                </div>

                <!-- Address Textarea -->
                <div class="relative group">
                    <span class="absolute top-4 left-4 text-gray-400 group-focus-within:text-primary transition-colors pointer-events-none">
                        <i class="fa-solid fa-map-location-dot text-sm"></i>
                    </span>
                    <textarea id="address" placeholder=" " class="peer w-full pl-11 pr-4 pt-3.5 pb-2 bg-gray-50/60 border-2 border-gray-100 rounded-2xl outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all text-dark font-medium placeholder-transparent text-sm h-24 resize-none"></textarea>
                    <label for="address" class="absolute left-11 top-6 -translate-y-1/2 text-gray-400 text-sm transition-all duration-200 pointer-events-none peer-focus:top-3 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-white peer-focus:px-2 peer-[:not(:placeholder-shown)]:top-3 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:bg-white peer-[:not(:placeholder-shown)]:px-2">বর্তমান সম্পূর্ণ ঠিকানা</label>
                </div>

                <!-- Navigation Buttons for Step 2 -->
                <div class="flex gap-4">
                    <button type="button" id="btn-back" class="w-1/3 py-4 bg-gray-100 text-muted rounded-2xl font-bold hover:bg-gray-200 active:scale-[0.99] transition-all flex items-center justify-center gap-2 text-sm">
                        <i class="fa-solid fa-arrow-left"></i> পূর্ববর্তী
                    </button>
                    <button type="submit" class="w-2/3 py-4 bg-gradient-to-r from-primary to-orange-500 text-white rounded-2xl font-bold hover:opacity-95 active:scale-[0.99] transition-all shadow-lg shadow-orange-500/10 flex items-center justify-center gap-2 text-sm">
                        <i class="fa-solid fa-briefcase"></i>  রেজিস্ট্রেশন করুন
                    </button>
                </div>
            </div>

        </form>

        <!-- Footer Links -->
        <div class="text-center mt-8 pt-6 border-t border-gray-100 text-sm text-muted space-y-2">
            <p>ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="/login" class="text-primary font-bold hover:underline">লগইন করুন</a></p>
            <p>সাধারণ কাস্টমার অ্যাকাউন্ট খুলতে চান? <a href="/signup" class="text-primary font-bold hover:underline">এখানে ক্লিক করুন</a></p>
        </div>
    </div><!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let supabaseClient = null;

            // --- ক. ডাইনামিক সুপাবেস কনফিগ লোড করার ফাংশন ---
            async function initializeSupabase() {
                try {
                    const response = await fetch('/api/auth/config');
                    if (!response.ok) throw new Error("Config API Error");
                    const config = await response.json();
                    
                    if (config.supabase_url && config.supabase_anon_key) {
                        // window.supabase ব্যবহার করা হয়েছে গ্লোবাল কনফ্লিক্ট এড়াতে
                        supabaseClient = window.supabase.createClient(config.supabase_url, config.supabase_anon_key);
                        console.log("Supabase Client initialized dynamically.");
                    }
                } catch (err) {
                    console.error("Supabase failed to load dynamically:", err);
                }
            }

            initializeSupabase();

            // --- খ. টু-স্টেপ ফর্ম নেভিগেশন লজিক ---
            const step1 = document.getElementById('form-step-1');
            const step2 = document.getElementById('form-step-2');
            const btnNext = document.getElementById('btn-next');
            const btnBack = document.getElementById('btn-back');

            const step1Indicator = document.getElementById('step-1-indicator');
            const step2Indicator = document.getElementById('step-2-indicator');
            const stepDivider = document.getElementById('step-divider');

            // প্রথম ধাপের রিকোয়ার্ড ফিল্ড ভ্যালিডেশন
            function validateStep1() {
                const fullname = document.getElementById('fullname').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value.trim();

                if (!fullname || !email || !phone || !password) {
                    alert("দয়া করে প্রথম ধাপের সবগুলি প্রয়োজনীয় ফিল্ড পূরণ করুন।");
                    return false;
                }
                return true;
            }

            btnNext.addEventListener('click', () => {
                if (validateStep1()) {
                    // এনিমেশন ট্রানজিশন সহ স্লাইড পরিবর্তন
                    step1.classList.add('hidden');
                    step2.classList.remove('hidden');

                    // ইন্ডিকেটর স্টাইল আপডেট
                    step1Indicator.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-orange-100 text-primary text-xs font-bold transition-all duration-300";
                    stepDivider.className = "h-0.5 w-10 bg-primary";
                    step2Indicator.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-primary text-white text-xs font-bold transition-all duration-300 shadow-lg shadow-primary/20";
                }
            });

            btnBack.addEventListener('click', () => {
                step2.classList.add('hidden');
                step1.classList.remove('hidden');

                // ইন্ডিকেটর রিস্টোর
                step1Indicator.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-primary text-white text-xs font-bold transition-all duration-300 shadow-lg shadow-primary/20";
                stepDivider.className = "h-0.5 w-10 bg-gray-200";
                step2Indicator.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-gray-100 text-muted text-xs font-bold transition-all duration-300";
            });

            // --- ক. ইউআরএল থেকে রেফারেল কোড অটো-ডিটেক্ট করা ---
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            
            if (refCode) {
                const refInput = document.getElementById('referred_by');
                if (refInput) {
                    refInput.value = refCode;
                    refInput.readOnly = true; // লক করা হলো যাতে ভুলবশত পরিবর্তন না হয়
                    refInput.className += " bg-gray-150 text-gray-400 border-gray-300 font-bold";
                }
            }

            // --- গ. ওয়ার্কার রেজিস্ট্রেশন সাবমিট হ্যান্ডলার (সংশোধিত) ---
            document.getElementById('worker-signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                if (!supabaseClient) {
                    alert("সিস্টেম পুরোপুরি প্রস্তুত নয় বা সুপাবেস কানেক্ট করা যায়নি।");
                    return;
                }

                const fullname = document.getElementById('fullname').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value.trim();
                const referredByCode = document.getElementById('referred_by').value.trim();
                
                // স্টেপ ২ এর ডেটা সংগ্রহ (উইদাউট এডুকেশন ফিল্ড)
                const age = document.getElementById('age').value.trim();
                const city = document.getElementById('city').value.trim();
                const fb_link = document.getElementById('fb_link').value.trim();
                const address = document.getElementById('address').value.trim();

                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> প্রসেসিং হচ্ছে...`;

                try {
                    // role: 'reseller' পাস করা হচ্ছে ব্যাকএন্ড ও ডাটাবেজ সামঞ্জস্যতার জন্য
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullname,
                                phone_number: phone,
                                role: 'reseller', 
                                age: age ? parseInt(age) : null,
                                city: city,
                                fb_link: fb_link,
                                address: address,
                                referred_by_code: referredByCode ? parseInt(referredByCode) : null
                            }
                        }
                    });

                    if (error) {
                        alert("রেজিস্ট্রেশন ত্রুটি: " + error.message);
                        return;
                    }

                    if (data.user) {
                        alert("ওয়ার্কার হিসেবে আপনার রেজিস্ট্রেশন সফলভাবে সম্পন্ন হয়েছে! অনুগ্রহ করে ইমেইল ভেরিফাই করুন।");
                        window.location.href = "/login";
                    }
                } catch (err) {
                    alert("রেজিস্ট্রেশন প্রসেসে ত্রুটি: " + err.message);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i class="fa-solid fa-briefcase"></i>  রেজিস্ট্রেশন করুন`;
                }
            });
        });
    </script>
